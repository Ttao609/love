
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>恋的纪念日</title>
  <style>
    :root {
      --milk: #fffaf4;
      --cream: #fff5ee;
      --petal: #ffd7e6;
      --blush: #ff9fc5;
      --blue: #b9ddff;
      --ink: #4d3f49;
      --soft-ink: #766675;
      --line: rgba(255, 255, 255, 0.62);
      --glass: rgba(255, 255, 255, 0.46);
      --shadow: 0 22px 60px rgba(172, 112, 142, 0.22);
      --ease: ease-in-out;
      --mx: 0px;
      --my: 0px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 215, 230, 0.72), transparent 34%),
        radial-gradient(circle at 83% 18%, rgba(185, 221, 255, 0.74), transparent 36%),
        linear-gradient(145deg, var(--milk) 0%, var(--cream) 38%, #eef7ff 100%);
    }

    body {
      opacity: 0;
      animation: appFade 900ms var(--ease) forwards;
    }

    button {
      border: 0;
      font: inherit;
      color: inherit;
    }

    img {
      display: block;
      max-width: 100%;
      transform: translateZ(0);
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100dvh;
      isolation: isolate;
    }

    .ambient {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .ambient::before,
    .ambient::after {
      content: "";
      position: absolute;
      width: 58vmax;
      aspect-ratio: 1;
      border-radius: 50%;
      filter: blur(36px);
      opacity: 0.5;
      transform: translate3d(calc(var(--mx) * -0.5), calc(var(--my) * -0.5), 0);
      transition: transform 200ms linear;
    }

    .ambient::before {
      left: -22vmax;
      top: -20vmax;
      background: rgba(255, 199, 220, 0.72);
    }

    .ambient::after {
      right: -26vmax;
      bottom: -22vmax;
      background: rgba(181, 222, 255, 0.72);
    }

    .particle,
    .fall-heart {
      position: absolute;
      width: var(--size);
      height: var(--size);
      opacity: 0;
      transform: translate3d(0, 0, 0) rotate(45deg);
      background: rgba(255, 150, 190, 0.48);
      border-radius: 28% 28% 4px 28%;
      will-change: transform, opacity;
    }

    .particle::before,
    .particle::after,
    .fall-heart::before,
    .fall-heart::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: inherit;
    }

    .particle::before,
    .fall-heart::before {
      left: -50%;
      top: 0;
    }

    .particle::after,
    .fall-heart::after {
      left: 0;
      top: -50%;
    }

    .particle {
      left: var(--left);
      bottom: -8vh;
      animation: floatHeart var(--duration) linear var(--delay) infinite;
    }

    .pages {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
    }

    .page {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: max(22px, env(safe-area-inset-top)) 18px max(22px, env(safe-area-inset-bottom));
      opacity: 0;
      visibility: hidden;
      transform: translate3d(0, 22px, 0);
      transition:
        opacity 0.8s var(--ease),
        transform 0.8s var(--ease),
        visibility 0s linear 0.8s;
      will-change: opacity, transform;
      pointer-events: none;
    }

    .page.active {
      opacity: 1;
      visibility: visible;
      transform: translate3d(0, 0, 0);
      transition:
        opacity 0.8s var(--ease),
        transform 0.8s var(--ease),
        visibility 0s;
      pointer-events: auto;
    }

    .page.exiting-up {
      transform: translate3d(0, -18px, 0);
    }

    .page.exiting-down {
      transform: translate3d(0, 18px, 0);
    }

    .scene {
      width: min(100%, 1120px);
      min-height: min(82dvh, 760px);
      display: grid;
      align-content: center;
      gap: 22px;
      transform: translate3d(calc(var(--mx) * var(--depth, 0)), calc(var(--my) * var(--depth, 0)), 0);
      transition: transform 220ms linear;
    }

    .cover-scene {
      --depth: 0.16;
      text-align: center;
      justify-items: center;
      min-height: 74dvh;
    }

    .eyebrow {
      margin: 0;
      font-size: clamp(13px, 3.2vw, 15px);
      color: var(--soft-ink);
      letter-spacing: 0;
    }

    .title {
      margin: 0;
      font-size: clamp(40px, 13vw, 92px);
      line-height: 1.05;
      font-weight: 750;
      letter-spacing: 0;
      color: #5a4655;
      text-wrap: balance;
    }

    .title .day-number {
      display: inline-block;
      margin: 0 4px;
      font-size: 1.24em;
      color: #ff77a9;
      text-shadow: 0 14px 36px rgba(255, 119, 169, 0.24);
    }

    .char {
      display: inline-block;
      opacity: 0;
      transform: translate3d(0, 12px, 0);
      animation: charIn 620ms var(--ease) forwards;
      animation-delay: calc(var(--i) * 74ms + 260ms);
    }

    .subtitle {
      width: min(92vw, 560px);
      margin: 0;
      color: var(--soft-ink);
      font-size: clamp(15px, 4vw, 18px);
      line-height: 1.9;
    }

    .scroll-cue {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.42);
      box-shadow: 0 10px 28px rgba(172, 112, 142, 0.16);
      transform: translateX(-50%);
      color: #ff7cac;
      animation: breathe 1.9s var(--ease) infinite;
      pointer-events: none;
    }

    .scroll-cue svg {
      width: 22px;
      height: 22px;
    }

    .memory-layout {
      --depth: 0.08;
      grid-template-rows: auto auto;
      gap: 24px;
    }

    .photo-frame {
      width: min(100%, 520px);
      justify-self: center;
      border-radius: 28px;
      padding: 9px;
      background: rgba(255, 255, 255, 0.56);
      box-shadow: var(--shadow);
      overflow: hidden;
      opacity: 0;
      transform: translate3d(0, -32px, 0);
      will-change: transform, filter, opacity;
    }

    .page.active .photo-frame {
      animation: slideSoft 780ms var(--ease) 130ms forwards;
    }

    .photo-frame img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 22px;
      transition: transform 420ms var(--ease), filter 420ms var(--ease);
    }

    .photo-frame:hover img {
      transform: scale(1.035);
      filter: brightness(1.06);
    }

    .copy-panel {
      width: min(100%, 620px);
      justify-self: center;
      padding: 4px 6px;
      opacity: 0;
      transform: translate3d(0, 28px, 0);
    }

    .page.active .copy-panel {
      animation: slideSoft 760ms var(--ease) 310ms forwards;
    }

    .section-kicker {
      margin: 0 0 10px;
      font-size: 13px;
      color: #ff82af;
      letter-spacing: 0;
      font-weight: 700;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: clamp(24px, 7vw, 42px);
      line-height: 1.2;
      letter-spacing: 0;
      color: #5c4755;
    }

    .type-lines {
      min-height: 168px;
      display: grid;
      align-content: start;
      gap: 10px;
      color: var(--soft-ink);
      font-size: clamp(15px, 4vw, 18px);
      line-height: 1.85;
    }

    .type-line {
      min-height: 1.85em;
    }

    .fragments-scene {
      --depth: 0.05;
      gap: 18px;
    }

    .fragment-grid {
      display: grid;
      width: min(100%, 920px);
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .fragment-card {
      min-width: 0;
      padding: 7px 7px 10px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid var(--line);
      box-shadow: 0 12px 34px rgba(172, 112, 142, 0.13);
      cursor: zoom-in;
      opacity: 0;
      transform: translate3d(0, 20px, 0);
      transition: transform 330ms var(--ease), box-shadow 330ms var(--ease), background 330ms var(--ease);
      will-change: transform, opacity;
    }

    .page.active .fragment-card {
      animation: itemIn 660ms var(--ease) forwards;
      animation-delay: calc(var(--order) * 150ms + 120ms);
    }

    .fragment-card:hover {
      transform: translate3d(0, -7px, 0);
      box-shadow: 0 20px 44px rgba(172, 112, 142, 0.24);
      background: rgba(255, 255, 255, 0.68);
    }

    .fragment-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 15px;
    }

    .fragment-card p {
      margin: 8px 3px 0;
      min-height: 2.9em;
      display: grid;
      place-items: center;
      text-align: center;
      font-size: clamp(12px, 3.2vw, 14px);
      line-height: 1.45;
      color: #765f70;
    }

    .promises-scene {
      --depth: 0.06;
      width: min(100%, 720px);
    }

    .promise-list {
      display: grid;
      gap: 12px;
      width: 100%;
    }

    .flip-card {
      position: relative;
      width: 100%;
      height: clamp(94px, 20dvh, 128px);
      perspective: 1000px;
      opacity: 0;
      transform: translate3d(0, 26px, 0) scale(0.96);
      will-change: transform, opacity;
    }

    .page.active .flip-card {
      animation: popIn 780ms cubic-bezier(0.2, 1.35, 0.35, 1) forwards;
      animation-delay: calc(var(--order) * 140ms + 140ms);
    }

   .flip-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.9s cubic-bezier(0.22, 1.2, 0.36, 1);
}

  .flip-card.flipped .flip-inner {
  transform: rotateY(180deg) scale(1.05);
}

    .face {
      position: absolute;
      inset: 0;
      display: grid;
      align-content: center;
      gap: 6px;
      padding: 18px 44px 18px 20px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.72), rgba(255, 235, 244, 0.58)),
        linear-gradient(135deg, rgba(255, 215, 230, 0.3), rgba(185, 221, 255, 0.28));
      box-shadow: 0 16px 42px rgba(172, 112, 142, 0.16);
      backface-visibility: hidden;
      overflow: hidden;
    }
	.face::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 24px;
  pointer-events: none;
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: inset 0 0 20px rgba(255,255,255,0.25);
}

    .face.back {
  transform: rotateY(180deg);
  background:
    linear-gradient(135deg, rgba(255,255,255,0.9), rgba(220,240,255,0.7)),
    linear-gradient(135deg, rgba(255,160,200,0.35), rgba(150,200,255,0.35));

  box-shadow: 0 20px 60px rgba(120, 160, 255, 0.35);
}

    .face h3,
    .face p {
      margin: 0;
    }

    .face h3 {
      font-size: clamp(18px, 4.8vw, 24px);
      letter-spacing: 0;
    }

    .face p {
      font-size: clamp(13px, 3.4vw, 15px);
      line-height: 1.65;
      color: var(--soft-ink);
    }

    .tiny-heart {
      position: absolute;
      right: 18px;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translateY(-50%) rotate(45deg);
      border-radius: 30% 30% 4px 30%;
      background: rgba(255, 134, 177, 0.52);
    }

    .tiny-heart::before,
    .tiny-heart::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: inherit;
    }

    .tiny-heart::before {
      left: -50%;
    }

    .tiny-heart::after {
      top: -50%;
    }

    .letter-scene {
      --depth: 0.045;
      width: min(100%, 760px);
      min-height: 86dvh;
      gap: 12px;
    }

    .letter-paper {
      width: 100%;
      max-height: min(70dvh, 640px);
      overflow: hidden;
      padding: clamp(22px, 5vw, 38px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.74);
      background:
        linear-gradient(rgba(255, 255, 255, 0.58) 1px, transparent 1px) 0 24px / 100% 32px,
        radial-gradient(circle at 18% 8%, rgba(255, 215, 230, 0.46), transparent 28%),
        linear-gradient(135deg, rgba(255, 253, 248, 0.88), rgba(255, 244, 248, 0.86));
      box-shadow: var(--shadow);
    }

    .letter-paper h2 {
      margin: 0 0 14px;
      font-size: clamp(24px, 6.6vw, 40px);
      line-height: 1.2;
    }

    .letter-body {
      display: grid;
      gap: 12px;
      max-height: min(45dvh, 390px);
      overflow: hidden;
      color: #665362;
      font-size: clamp(14px, 3.7vw, 17px);
      line-height: 1.9;
    }

    .letter-body p {
      margin: 0;
      opacity: 0;
      transform: translate3d(0, 14px, 0);
    }

    .page.active .letter-body p {
      animation: itemIn 900ms var(--ease) forwards;
      animation-delay: calc(var(--order) * 450ms + 260ms);
    }

    .heart-button {
      justify-self: center;
      min-width: 178px;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 999px;
      color: white;
      background: linear-gradient(135deg, #ff87b6, #8ccaff);
      box-shadow: 0 16px 36px rgba(255, 135, 182, 0.32);
      cursor: pointer;
      transition: transform 240ms var(--ease), box-shadow 240ms var(--ease);
    }

    .heart-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 44px rgba(255, 135, 182, 0.38);
    }

    .countdown,
    .closing {
      margin: 0;
      text-align: center;
      color: var(--soft-ink);
      line-height: 1.7;
      font-size: clamp(13px, 3.5vw, 16px);
    }

    .closing {
      color: #ff79a9;
      font-weight: 700;
    }

    .music-toggle,
    .nav-btn {
      position: fixed;
      z-index: 5;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.68);
      background: rgba(255, 255, 255, 0.52);
      box-shadow: 0 12px 32px rgba(172, 112, 142, 0.16);
      backdrop-filter: blur(14px);
      cursor: pointer;
      transition: transform 240ms var(--ease), background 240ms var(--ease), opacity 240ms var(--ease);
    }

    .music-toggle {
      right: 14px;
      top: max(14px, env(safe-area-inset-top));
      width: 42px;
      height: 42px;
      border-radius: 50%;
      color: #ff77a9;
    }

    .music-toggle:hover,
    .nav-btn:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.72);
    }

    .music-toggle svg,
    .nav-btn svg {
      width: 20px;
      height: 20px;
      stroke-width: 2;
    }

    .music-toggle.playing {
      color: #6dabee;
    }

    .nav-stack {
      position: fixed;
      right: 14px;
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 5;
      display: grid;
      gap: 10px;
    }

    .nav-btn {
      position: static;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      color: #735e6e;
    }

    .nav-btn:disabled {
      opacity: 0.34;
      cursor: default;
      transform: none;
    }

    .page-dots {
      position: fixed;
      left: 14px;
      top: 50%;
      z-index: 5;
      display: grid;
      gap: 8px;
      transform: translateY(-50%);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
      box-shadow: 0 0 0 1px rgba(255, 135, 182, 0.12);
      transition: height 300ms var(--ease), background 300ms var(--ease);
    }

    .dot.active {
      height: 22px;
      background: #ff8bb8;
    }

    .lightbox,
    .heart-rain {
      position: fixed;
      inset: 0;
      z-index: 12;
      pointer-events: none;
    }

    .lightbox {
      display: grid;
      place-items: center;
      padding: 20px;
      opacity: 0;
      visibility: hidden;
      background: rgba(73, 52, 67, 0.34);
      backdrop-filter: blur(16px);
      transition: opacity 260ms var(--ease), visibility 0s linear 260ms;
    }

    .lightbox.show {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity 260ms var(--ease), visibility 0s;
    }

    .lightbox-inner {
      width: min(92vw, 760px);
      border-radius: 28px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.74);
      box-shadow: 0 28px 78px rgba(61, 42, 56, 0.26);
    }

    .lightbox img {
      width: 100%;
      max-height: 74dvh;
      object-fit: contain;
      border-radius: 20px;
    }

    .lightbox p {
      margin: 10px 8px 2px;
      text-align: center;
      color: #665362;
      line-height: 1.6;
    }

    .fall-heart {
      top: -8vh;
      left: var(--left);
      z-index: 13;
      animation: fall var(--duration) linear forwards;
      animation-delay: var(--delay);
      background: var(--color);
    }

    @media (min-width: 760px) {
      .page {
        padding: 40px 64px;
      }

      .memory-layout {
        grid-template-columns: 0.92fr 1fr;
        grid-template-rows: auto;
        align-items: center;
        gap: 48px;
      }

      .fragment-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .fragment-card:nth-child(2),
      .fragment-card:nth-child(5) {
        transform: translate3d(0, 28px, 0);
      }

      .promise-list {
        gap: 16px;
      }

      .flip-card {
        height: 124px;
	 animation: glowPulse 2.8s ease-in-out infinite;
      }

      .letter-body {
        max-height: 360px;
      }
    }

    @media (max-width: 420px) {
      .page-dots {
        left: 9px;
      }

      .nav-stack {
        right: 10px;
      }

      .fragment-grid {
        gap: 9px;
      }

      .fragment-card {
        border-radius: 16px;
        padding: 5px 5px 8px;
      }

      .fragment-card img {
        border-radius: 12px;
      }

      .fragment-card p {
        font-size: 11px;
      }

      .letter-paper {
        padding: 20px 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }

    @keyframes appFade {
      to { opacity: 1; }
    }

    @keyframes charIn {
      to {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
    }

    @keyframes floatHeart {
      0% {
        opacity: 0;
        transform: translate3d(0, 0, 0) rotate(45deg) scale(0.7);
      }
      12% {
        opacity: var(--opacity);
      }
      100% {
        opacity: 0;
        transform: translate3d(var(--drift), -112vh, 0) rotate(45deg) scale(1.2);
      }
    }

    @keyframes breathe {
      0%, 100% { transform: translateX(-50%) translateY(0) scale(1); }
      50% { transform: translateX(-50%) translateY(-7px) scale(1.06); }
    }

    @keyframes slideSoft {
      to {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
    }

    @keyframes itemIn {
      to {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
    }

    @keyframes popIn {
      0% {
        opacity: 0;
        transform: translate3d(0, 26px, 0) scale(0.96);
      }
      72% {
        opacity: 1;
        transform: translate3d(0, -4px, 0) scale(1.018);
      }
      100% {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    @keyframes fall {
      0% {
        opacity: 0;
        transform: translate3d(0, 0, 0) rotate(45deg) scale(0.6);
      }
      10% {
        opacity: 0.9;
      }
      100% {
        opacity: 0;
        transform: translate3d(var(--drift), 114vh, 0) rotate(405deg) scale(1.05);
      }
    }
	
@keyframes glowPulse {
  0%,100% {
    box-shadow: 0 10px 30px rgba(255, 150, 190, 0.15);
  }
  50% {
    box-shadow: 0 18px 50px rgba(255, 120, 170, 0.3);
  }
}
.ripple {
  position: absolute;
  width: 20px;
  height: 20px;
  background: rgba(255, 150, 200, 0.5);
  border-radius: 50%;
  transform: translate(-50%, -50%) scale(0);
  animation: rippleEffect 0.6s ease-out;
  pointer-events: none;
}

@keyframes rippleEffect {
  to {
    transform: translate(-50%, -50%) scale(12);
    opacity: 0;
  }
}
  </style>
</head>
<body>
  <div class="app" aria-live="polite">
    <div class="ambient" id="ambient"></div>

    <button class="music-toggle" id="musicToggle" type="button" aria-label="播放背景音乐" title="播放背景音乐">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
        <path d="M9 18V5l12-2v13" />
        <circle cx="6" cy="18" r="3" />
        <circle cx="18" cy="16" r="3" />
      </svg>
    </button>

    <main class="pages" id="pages">
      <section class="page active" data-page="0" aria-label="封面页">
        <div class="scene cover-scene">
          <p class="eyebrow">从相恋那天起，每一天都在想你</p>
          <h1 class="title" id="coverTitle">恋的第<span class="day-number" id="loveDays">0</span>天</h1>
          <p class="subtitle">隔着城市、路灯和晚风，我还是能很确定地说：你一直在我生活最柔软的地方。</p>
        </div>
        <div class="scroll-cue" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
          </svg>
        </div>
      </section>

      <section class="page" data-page="1" aria-label="回忆起点页">
        <div class="scene memory-layout">
          <div class="photo-frame">
            <img id="memoryPhoto" alt="我们的合照" />
          </div>
          <div class="copy-panel">
            <p class="section-kicker">OUR FIRST CHAPTER</p>
            <h2 class="section-title">回忆开始的地方</h2>
            <div class="type-lines" id="typeLines"></div>
          </div>
        </div>
      </section>

      <section class="page" data-page="2" aria-label="日常碎片页">
        <div class="scene fragments-scene">
          <div>
            <p class="section-kicker">LITTLE MOMENTS</p>
            <h2 class="section-title">把日常攒成星河</h2>
          </div>
          <div class="fragment-grid" id="fragmentGrid"></div>
        </div>
      </section>

      <section class="page" data-page="3" aria-label="异地约定页">
        <div class="scene promises-scene">
          <div>
            <p class="section-kicker">PROMISES</p>
            <h2 class="section-title">异地也要认真相爱</h2>
          </div>
          <div class="promise-list" id="promiseList"></div>
        </div>
      </section>

      <section class="page" data-page="4" aria-label="告白收尾页">
        <div class="scene letter-scene">
          <article class="letter-paper">
            <h2>写给最特别的你</h2>
            <div class="letter-body" id="letterBody"></div>
          </article>
          <button class="heart-button" id="heartButton" type="button">点击收取心意</button>
          <p class="countdown" id="countdown"></p>
          <p class="closing" id="closingText"></p>
        </div>
      </section>
    </main>

    <div class="page-dots" id="pageDots" aria-hidden="true"></div>
    <div class="nav-stack" aria-label="页面切换按钮">
      <button class="nav-btn" id="prevBtn" type="button" aria-label="上一页">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M18 15l-6-6-6 6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
        </svg>
      </button>
      <button class="nav-btn" id="nextBtn" type="button" aria-label="下一页">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
        </svg>
      </button>
    </div>

    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="照片预览">
      <div class="lightbox-inner">
        <img id="lightboxImg" alt="放大的日常照片" />
        <p id="lightboxCaption"></p>
      </div>
    </div>
    <div class="heart-rain" id="heartRain"></div>
  </div>

  <script>
    const CONFIG = {
      startDate: "2025-11-10",
      nextMeetDate: "2026-08-20",
      bgMusicUrl: "bgm.mp3",
      memoryPhoto: "1.jpg",
      memoryStory: [
        "那天以后，聊天框里的每一句晚安都开始有了重量。",
        "也许距离把拥抱变得慢一点，但它也让每一次奔向彼此都更加珍贵。"
      ],
      fragments: [
  { src: "2.jpg", text: "第一次相爱那天" },
  { src: "3.jpg", text: "一起走过的街" },
  { src: "4.jpg", text: "你笑起来很好看" },
  { src: "5.jpg", text: "那天的风很温柔" },
  { src: "6.jpg", text: "想一直记住的瞬间" },
  { src: "7.jpg", text: "以后还会有很多这样的日子" }
],
      promises: [
        { title: "【约定1】", detail: "无论多忙，都认真听彼此说完今天的小事。" },
        { title: "【约定2】", detail: "想念要说出口，委屈也要被温柔接住。" },
        { title: "【约定3】", detail: "一起存下见面的计划，把倒计时过成期待。" },
        { title: "【约定4】", detail: "在不同城市好好生活，也坚定地走向同一个未来。" }
      ],
      loveLetter: [
  "其实一开始，我也没想到会这么喜欢你。",
  "慢慢发现，好像每天都会不自觉想到你。",
  "你在的时候很安心，不在的时候会想你。",
  "谢谢你一直在我身边。",
  "以后也想继续这样陪着你。"
],
      closingText: "我们故事还在继续"
    };

    const $ = (selector, root = document) => root.querySelector(selector);
    const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));
    const MS_PER_DAY = 24 * 60 * 60 * 1000;
    const pages = $$(".page");
    const ambient = $("#ambient");
    const pageDots = $("#pageDots");
    const prevBtn = $("#prevBtn");
    const nextBtn = $("#nextBtn");
    const lightbox = $("#lightbox");
    const lightboxImg = $("#lightboxImg");
    const lightboxCaption = $("#lightboxCaption");
    const heartRain = $("#heartRain");
    let activePage = 0;
    let locked = false;
    let touchStartY = 0;
    let audio = null;
    let typedOnce = false;

    function localDate(value) {
      const normalized = String(value).replace(/\./g, "-");
      const parts = normalized.split("-").map(Number);
      if (parts.length < 3 || parts.some(Number.isNaN)) return null;
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function daysBetween(from, to, inclusive) {
      const start = localDate(from);
      if (!start) return 0;
      const today = new Date(to.getFullYear(), to.getMonth(), to.getDate());
      const diff = Math.floor((today - start) / MS_PER_DAY);
      return Math.max(0, diff + (inclusive ? 1 : 0));
    }

    function placeholder(label, index) {
      const hue = 338 + index * 12;
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="hsl(${hue}, 88%, 91%)"/>
              <stop offset="0.55" stop-color="#fffaf4"/>
              <stop offset="1" stop-color="hsl(207, 92%, 88%)"/>
            </linearGradient>
            <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#b97995" flood-opacity=".18"/>
            </filter>
          </defs>
          <rect width="900" height="900" rx="68" fill="url(#g)"/>
          <circle cx="225" cy="188" r="128" fill="#fff" opacity=".34"/>
          <circle cx="712" cy="708" r="178" fill="#fff" opacity=".28"/>
          <g filter="url(#s)" transform="translate(450 425) rotate(45)">
            <path d="M0 150 C-120 40 -210 -30 -150 -120 C-102 -191 -15 -158 0 -86 C15 -158 102 -191 150 -120 C210 -30 120 40 0 150Z" fill="#ff91ba" opacity=".58"/>
          </g>
          <text x="450" y="690" text-anchor="middle" fill="#755f70" font-family="Arial, sans-serif" font-size="54" font-weight="700">${label}</text>
          <text x="450" y="754" text-anchor="middle" fill="#8a7585" font-family="Arial, sans-serif" font-size="28">替换成你们的照片</text>
        </svg>`;
      return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    }

    function initDays() {
      $("#loveDays").textContent = daysBetween(CONFIG.startDate, new Date(), true);
      animateTitle();
      const next = localDate(CONFIG.nextMeetDate);
      const countdown = $("#countdown");
      if (!next) {
        countdown.textContent = "距离下次见面还有 X 天";
        return;
      }
      const today = new Date();
      const base = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const left = Math.ceil((next - base) / MS_PER_DAY);
      countdown.textContent = left >= 0
        ? `距离下次见面还有 ${left} 天`
        : "下一次见面已经变成了新的回忆";
    }

    function animateTitle() {
      const title = $("#coverTitle");
      const nodes = Array.from(title.childNodes);
      title.textContent = "";
      let index = 0;
      nodes.forEach((node) => {
        if (node.nodeType === Node.TEXT_NODE) {
          node.textContent.split("").forEach((char) => {
            const span = document.createElement("span");
            span.className = "char";
            span.style.setProperty("--i", index++);
            span.textContent = char;
            title.appendChild(span);
          });
          return;
        }
        const wrap = document.createElement("span");
        wrap.className = "char";
        wrap.style.setProperty("--i", index++);
        wrap.appendChild(node.cloneNode(true));
        title.appendChild(wrap);
      });
    }

    function initParticles() {
      const total = 30;
      for (let i = 0; i < total; i += 1) {
        const heart = document.createElement("span");
        heart.className = "particle";
        heart.style.setProperty("--left", `${Math.random() * 100}%`);
        heart.style.setProperty("--size", `${8 + Math.random() * 16}px`);
        heart.style.setProperty("--duration", `${16 + Math.random() * 15}s`);
        heart.style.setProperty("--delay", `${i * 0.18 + Math.random() * 7}s`);
        heart.style.setProperty("--drift", `${(Math.random() - 0.5) * 34}vw`);
        heart.style.setProperty("--opacity", `${0.18 + Math.random() * 0.34}`);
        ambient.appendChild(heart);
      }
    }

    function initMemory() {
      $("#memoryPhoto").src = CONFIG.memoryPhoto || placeholder("合照", 0);
      const box = $("#typeLines");
      CONFIG.memoryStory.forEach(() => {
        const line = document.createElement("div");
        line.className = "type-line";
        box.appendChild(line);
      });
    }

    function typeStory() {
      if (typedOnce) return;
      typedOnce = true;
      const lines = $$(".type-line", $("#typeLines"));
      let lineIndex = 0;
      let charIndex = 0;
      function tick() {
        if (lineIndex >= CONFIG.memoryStory.length) return;
        const text = CONFIG.memoryStory[lineIndex];
        lines[lineIndex].textContent = text.slice(0, charIndex + 1);
        charIndex += 1;
        if (charIndex < text.length) {
          window.setTimeout(tick, 38);
        } else {
          lineIndex += 1;
          charIndex = 0;
          window.setTimeout(tick, 360);
        }
      }
      window.setTimeout(tick, 520);
    }

    function initFragments() {
      const grid = $("#fragmentGrid");
      CONFIG.fragments.forEach((item, index) => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "fragment-card";
        card.style.setProperty("--order", index);
        const img = document.createElement("img");
        img.src = item.src || placeholder(`照片 ${index + 1}`, index + 1);
        img.alt = item.text;
        const text = document.createElement("p");
        text.textContent = item.text;
        card.append(img, text);
        card.addEventListener("click", () => openLightbox(img.src, item.text));
        grid.appendChild(card);
      });
    }

    function openLightbox(src, caption) {
      lightboxImg.src = src;
      lightboxCaption.textContent = caption;
      lightbox.classList.add("show");
    }

    function initPromises() {
      const list = $("#promiseList");
      CONFIG.promises.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "flip-card";
        card.style.setProperty("--order", index);
        card.innerHTML = `
          <div class="flip-inner" role="button" tabindex="0" aria-label="翻开${item.title}">
            <div class="face front">
              <h3>${item.title}</h3>
              <p>轻点翻开，看看藏起来的话。</p>
              <span class="tiny-heart" aria-hidden="true"></span>
            </div>
            <div class="face back">
              <h3>${item.title}</h3>
              <p>${item.detail}</p>
              <span class="tiny-heart" aria-hidden="true"></span>
            </div>
          </div>`;
        const inner = $(".flip-inner", card);
        inner.addEventListener("click", (e) => {
  // 翻转卡片
  card.classList.toggle("flipped");

  // ===== 波纹点击特效 =====
  const ripple = document.createElement("span");
  ripple.className = "ripple";

  const rect = card.getBoundingClientRect();
  ripple.style.left = `${e.clientX - rect.left}px`;
  ripple.style.top = `${e.clientY - rect.top}px`;

  card.appendChild(ripple);

  setTimeout(() => ripple.remove(), 600);
});
        inner.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            card.classList.toggle("flipped");
          }
        });
        list.appendChild(card);
      });
    }

    function initLetter() {
      const letterBody = $("#letterBody");
      CONFIG.loveLetter.forEach((text, index) => {
        const paragraph = document.createElement("p");
        paragraph.textContent = text;
        paragraph.style.setProperty("--order", index);
        letterBody.appendChild(paragraph);
      });
      $("#closingText").textContent = CONFIG.closingText;
    }

    function initDots() {
      pages.forEach((_, index) => {
        const dot = document.createElement("span");
        dot.className = "dot";
        if (index === 0) dot.classList.add("active");
        pageDots.appendChild(dot);
      });
    }

    function goToPage(nextIndex) {
      if (locked || nextIndex < 0 || nextIndex >= pages.length || nextIndex === activePage) return;
      locked = true;
      const direction = nextIndex > activePage ? "up" : "down";
      pages[activePage].classList.add(direction === "up" ? "exiting-up" : "exiting-down");
      pages[activePage].classList.remove("active");
      activePage = nextIndex;
      pages[activePage].classList.add("active");
      updateNav();
      if (activePage === 1) typeStory();
      window.setTimeout(() => {
        pages.forEach((page) => page.classList.remove("exiting-up", "exiting-down"));
        locked = false;
      }, 840);
    }

    function updateNav() {
      prevBtn.disabled = activePage === 0;
      nextBtn.disabled = activePage === pages.length - 1;
      $$(".dot", pageDots).forEach((dot, index) => {
        dot.classList.toggle("active", index === activePage);
      });
    }

    function initNavigation() {
      prevBtn.addEventListener("click", () => goToPage(activePage - 1));
      nextBtn.addEventListener("click", () => goToPage(activePage + 1));
      window.addEventListener("wheel", (event) => {
        event.preventDefault();
        if (Math.abs(event.deltaY) < 18) return;
        goToPage(activePage + (event.deltaY > 0 ? 1 : -1));
      }, { passive: false });
      window.addEventListener("touchstart", (event) => {
        touchStartY = event.touches[0].clientY;
      }, { passive: true });
      window.addEventListener("touchmove", (event) => {
        event.preventDefault();
      }, { passive: false });
      window.addEventListener("touchend", (event) => {
        const endY = event.changedTouches[0].clientY;
        const diff = touchStartY - endY;
        if (Math.abs(diff) > 46) goToPage(activePage + (diff > 0 ? 1 : -1));
      }, { passive: true });
      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowDown") goToPage(activePage + 1);
        if (event.key === "ArrowUp") goToPage(activePage - 1);
        if (event.key === "Escape") lightbox.classList.remove("show");
      });
      lightbox.addEventListener("click", () => lightbox.classList.remove("show"));
      updateNav();
    }

    function initParallax() {
      window.addEventListener("pointermove", (event) => {
        const x = (event.clientX / window.innerWidth - 0.5) * 18;
        const y = (event.clientY / window.innerHeight - 0.5) * 18;
        document.documentElement.style.setProperty("--mx", `${x}px`);
        document.documentElement.style.setProperty("--my", `${y}px`);
      });
    }

    function initMusic() {
      const toggle = $("#musicToggle");
      if (CONFIG.bgMusicUrl) {
        audio = new Audio(CONFIG.bgMusicUrl);
        audio.loop = true;
        audio.preload = "none";
        audio.volume = 0.46;
      }
      toggle.addEventListener("click", async () => {
        if (!audio) {
          toggle.title = "在 CONFIG.bgMusicUrl 填入音乐链接后可播放";
          toggle.setAttribute("aria-label", "在 CONFIG.bgMusicUrl 填入音乐链接后可播放");
          toggle.animate([
            { transform: "translateX(0)" },
            { transform: "translateX(-3px)" },
            { transform: "translateX(3px)" },
            { transform: "translateX(0)" }
          ], { duration: 260, easing: "ease-in-out" });
          return;
        }
        try {
          if (audio.paused) {
            await audio.play();
            toggle.classList.add("playing");
            toggle.setAttribute("aria-label", "暂停背景音乐");
            toggle.title = "暂停背景音乐";
          } else {
            audio.pause();
            toggle.classList.remove("playing");
            toggle.setAttribute("aria-label", "播放背景音乐");
            toggle.title = "播放背景音乐";
          }
        } catch (error) {
          toggle.title = "音乐暂时无法播放，请检查链接";
        }
      });
    }

    function heartBurst() {
      const colors = ["#ff8ab7", "#ffc2d8", "#9fcfff", "#ffe7ef", "#ff78aa"];
      for (let i = 0; i < 86; i += 1) {
        const heart = document.createElement("span");
        heart.className = "fall-heart";
        heart.style.setProperty("--left", `${Math.random() * 100}%`);
        heart.style.setProperty("--size", `${9 + Math.random() * 17}px`);
        heart.style.setProperty("--duration", `${3.6 + Math.random() * 3.4}s`);
        heart.style.setProperty("--delay", `${Math.random() * 0.9}s`);
        heart.style.setProperty("--drift", `${(Math.random() - 0.5) * 42}vw`);
        heart.style.setProperty("--color", colors[Math.floor(Math.random() * colors.length)]);
        heartRain.appendChild(heart);
        window.setTimeout(() => heart.remove(), 7600);
      }
    }

    function init() {
      initDays();
      initParticles();
      initMemory();
      initFragments();
      initPromises();
      initLetter();
      initDots();
      initNavigation();
      initParallax();
      initMusic();
      $("#heartButton").addEventListener("click", heartBurst);
    }

    init();
  </script>
</body>
</html>
